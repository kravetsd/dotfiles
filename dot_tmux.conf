# Prefix: Ctrl-A (more ergonomic than Ctrl-B)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Mouse support
set -g mouse on

# OSC 52 clipboard passthrough — lets Neovim write to the local Windows clipboard over SSH
set -g set-clipboard on

# True color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Start window and pane numbering at 1; renumber on close
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# No delay for escape key (important for Neovim)
set -s escape-time 0

# Allow Neovim autoread to detect file changes
set -g focus-events on

# Increase scrollback buffer
set -g history-limit 10000

# Vi keys in copy mode
setw -g mode-keys vi

# Intuitive splits that open in the current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Reload config in-place
bind r source-file ~/.tmux.conf \; display "tmux config reloaded"

# Status bar
set -g status-style "bg=colour235,fg=colour250"
set -g status-left "#[fg=colour148,bold] #S "
set -g status-left-length 20
set -g status-right "#[fg=colour250] %H:%M  %d %b "
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=colour166,bold] #I:#W "
